<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Task Board</title>
    <!-- Sets data-theme from localStorage before first paint to avoid a
         light-mode flash. Inline + synchronous (no defer) so it runs before
         body render. Must stay in sync with App.tsx's localStorage 'theme' key
         and the [data-theme] CSS in index.css. -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('theme') === 'dark' ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) { /* localStorage unavailable — fall back to CSS default */ }
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
